            auto& status = id(ecodan_instance).get_status();
            int today = status.day_of_year();
            if (today == -1) return;

            int last_day = id(last_dhw_consumed_update_day);

            if (last_day == -1) {
              id(last_dhw_consumed_update_day) = today;
              last_day = today;
            }

            if (today != last_day) {
              float current = id(sensor_dhw_consumed_total).state;
              if (std::isnan(current)) current = 0.0f;
