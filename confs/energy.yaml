  - platform: template
    name: ${total_increasing_heating_consumed}
    id: sensor_heating_consumed_total
    unit_of_measurement: 'kWh'
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    update_interval: never
      
