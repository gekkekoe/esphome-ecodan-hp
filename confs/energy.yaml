            if (today != last_day) {
              float current = id(sensor_heating_produced_total).state;
              if (std::isnan(current)) current = 0.0f;
              id(sensor_heating_produced_total).publish_state(current + x);
              id(last_heating_produced_update_day) = today;
            }

    dhw_consumed:
      id: dhw_consumed
      name: ${dhw_consumed}
      filters:
        - filter_out: nan
      on_value:
