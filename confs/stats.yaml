number:
 # Overridable solver inputs
  - platform: template
    id: num_raw_heat_produced
    name: ${num_raw_heat_produced}
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: 0.0
    max_value: 200.0
    step: 0.1

  - platform: template
    id: num_raw_elec_consumed
    name: ${num_raw_elec_consumed}
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: 0.0
    max_value: 100.0
    step: 0.1

  - platform: template
    id: num_raw_runtime_hours
    name: ${num_raw_runtime_hours}
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: 0.0
    max_value: 24.0
    step: 0.1

  - platform: template
    id: num_raw_avg_outside_temp
    name: ${num_raw_avg_outside_temp}
    optimistic: true
    restore_value: true
    initial_value: 7.0
    min_value: -25.0
    max_value: 40.0
    step: 0.1

  - platform: template
    id: num_raw_avg_room_temp
    name: ${num_raw_avg_room_temp}
    optimistic: true
    restore_value: true
    initial_value: 20.0
    min_value: 10.0
    max_value: 35.0
    step: 0.1

  - platform: template
    id: num_raw_delta_room_temp
    name: ${num_raw_delta_room_temp}
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: 0.0
    max_value: 10.0
    step: 0.1
  
  - platform: template
    name: "Raw Max Output Power"
    id: num_raw_max_output
    initial_value: 7.0
    min_value: 1.0
    max_value: 20.0
    step: 0.1
    optimistic: true
    restore_value: true
    unit_of_measurement: "kW"
    icon: "mdi:flash"

  - platform: template
    id: num_battery_soc_kwh
    name: ${num_battery_soc_kwh}
    icon: mdi:battery-charging
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: 0.0
    max_value: 100.0
    step: 0.1
    unit_of_measurement: kWh

  - platform: template
    id: num_battery_max_discharge_kw
    name: ${num_battery_max_discharge_kw}
    icon: mdi:lightning-bolt
    optimistic: true
    restore_value: true
    initial_value: 3.0
    min_value: 0.5
    max_value: 15.0
    step: 0.1
    unit_of_measurement: kW