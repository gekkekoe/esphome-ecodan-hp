substitutions:
  uart_rx_pin: 38
  uart_tx_pin: 39
  uart_proxy_rx_pin: 8
  uart_proxy_tx_pin: 7
  led_gpio_pin: 42
  # enable asgard prefixes
  asgard_prefix: ""
  is_internal_asgard_only: "false"
  z2_dashboard: !include
    file: asgard-dashboard-z2.yaml
  z2_thermostat: !include
    file: asgard-thermostat.yaml
    vars: 
      zone_identifier: "z2"
      gpio: "GPIO41"

<<: !include proxy-base.yaml

# override
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  partitions: partitions_16mb.csv   # Custom table; adds 8 MB LittleFS at 0x800000
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n
      CONFIG_FREERTOS_USE_TRACE_FACILITY: y
      CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS: y
      CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS: y
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_LWIP_TCPIP_TASK_STACK_SIZE: "12288"
      CONFIG_HTTPD_TASK_STACK_SIZE: "16384" 

      CONFIG_LWIP_NETCONN_FULLDUPLEX: y        # prevents use-after-close race on netconn
      CONFIG_LWIP_TCP_CLOSE_TIMEOUT_MS: "2000" # don't linger too long on broken connections
      CONFIG_LWIP_MAX_ACTIVE_TCP: "16" 
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "8"
      CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "32"
      CONFIG_LWIP_SO_RCVBUF: y 

      # LittleFS — required for esp_vfs_littlefs_register()
      CONFIG_LFS_BLOCK_CYCLES: "512"           # wear levelling aggressiveness
      CONFIG_LITTLEFS_MAX_PARTITIONS: "1"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

<<: !include asgard-sensors.yaml
<<: !include slave.yaml
<<: !include asgard-odin.yaml

packages:
 thermostat-room-0: !include { file: asgard-thermostat.yaml, vars: { zone_identifier: "z1", gpio: "GPIO40" } }
 thermostat-room-1: ${ z2_thermostat if z2_enabled else {} }
 dashboard-z1: !include asgard-dashboard-z1.yaml
 dashboard-z2: ${ z2_dashboard if z2_enabled else {} }

