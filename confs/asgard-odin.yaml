http_request:
  verify_ssl: false
  timeout: 5s

script:
  - id: fetch_odin_optimization
    then:
      - if:
          condition:
            - switch.is_on: sw_use_solver
            - lambda: 'return id(optimizer_ptr)->get_current_ecodan_hour() >= 0 && id(bin_solver_connected).state && id(txt_solver_ip).state != "0.0.0.0" && id(txt_solver_ip).state != "";'
          then:
            - http_request.post:
                url: !lambda 'return "http://" + id(txt_solver_ip).state + "/api/solve";'
                request_headers:
                  Content-Type: application/json
                  Connection: close
                capture_response: true
                max_response_buffer_size: 6144
                
                body: !lambda |-
                  char payload[600];
                  
                  // Get the active index from your specific select component
                  int heating_idx = id(heating_system_type).active_index().value_or(0);
                  const char* profile_str = "ufh"; // Default fallback
                  
                  if (heating_idx == 0 || heating_idx == 1) {
                      profile_str = "ufh";
                  } else if (heating_idx == 2 || heating_idx == 3) {
                      profile_str = "hybrid";
                  } else if (heating_idx == 4 || heating_idx == 5) {
                      profile_str = "radiators";
                  }

                  float solar_factor = id(num_raw_solar_factor).state;
                  if (std::isnan(solar_factor) || solar_factor <= 0.001f) {
                      solar_factor = 0.015f; // default
                  }

                  int _cur_hour = id(optimizer_ptr)->get_current_ecodan_hour();

                  snprintf(payload, sizeof(payload),
                      "{\"params\":{"
                      "\"heating_profile\":\"%s\","
                      "\"heat_produced\":%.3f,"
                      "\"elec_consumed\":%.3f,"
                      "\"runtime_hours\":%.2f,"
                      "\"avg_outside_temp\":%.2f,"
                      "\"avg_room_temp\":%.2f,"
                      "\"delta_room_temp\":%.2f,"
                      "\"max_output\":%.2f,"
                      "\"hl_tm_product\":%.4f,"
                      "\"passive_solar_gain_factor\":%.4f,"
                      "\"current_hour\":%d,"
                      "\"current_room_temp\":%.2f,"
                      "\"battery_soc_kwh\":%.2f,"
                      "\"battery_max_discharge_kw\":%.2f"
                      "}}",
                      profile_str,
                      id(num_raw_heat_produced).state,
                      id(num_raw_elec_consumed).state,
                      id(num_raw_runtime_hours).state,
                      id(num_raw_avg_outside_temp).state,
                      id(num_raw_avg_room_temp).state,
                      id(num_raw_delta_room_temp).state,
                      id(num_raw_max_output).state,
                      id(num_raw_hl_tm_product).state,
                      solar_factor,
                      _cur_hour,
                      id(virtual_climate_z1).current_temperature,
                      id(num_battery_soc_kwh).state,
                      id(num_battery_max_discharge_kw).state
                  );
                  return std::string(payload);

                on_response:
                  then:
                    - lambda: |-
                        if (response->status_code == 200) {
                          esphome::json::parse_json(body, [](JsonObject root) {
                            if (root["success"].as<bool>()) {
                              // Pre-allocate all vectors with exactly 24 slots to prevent memory fragmentation
                              std::vector<float> exp_end_t(24), nrg(24), prod(24), exp_t(24), cost(24), cost_tax(24), batt(24), sb(24), smn(24), smx(24), wth(24), sol(24), prc(24), op_mode(24);

                              JsonArray j_eet = root["expected_end_temp"];
                              JsonArray j_e  = root["energy_consumption"];
                              JsonArray j_p  = root["heat_production"];
                              JsonArray j_t  = root["expected_begin_temp"];
                              JsonArray j_c  = root["expected_cost"];
                              JsonArray j_ct = root["expected_cost_with_tax"];
                              JsonArray j_b  = root["battery_discharge"];
                              JsonArray j_sb = root["sched_base"];
                              JsonArray j_smn = root["sched_min"];
                              JsonArray j_smx = root["sched_max"];
                              JsonArray j_wth = root["weather"];
                              JsonArray j_sol = root["solar"];
                              JsonArray j_prc = root["prices"];
                              JsonArray j_op  = root["operation_mode"];

                              bool has_sb  = !j_sb.isNull();
                              bool has_smn = !j_smn.isNull();
                              bool has_smx = !j_smx.isNull();
                              bool has_wth = !j_wth.isNull();
                              bool has_sol = !j_sol.isNull();
                              bool has_prc = !j_prc.isNull();
                              bool has_op  = !j_op.isNull();

                              for (int i = 0; i < 24; i++) {
                                // Assign directly to the index instead of using push_back
                                exp_end_t[i] = j_eet[i].as<float>();
                                nrg[i]      = j_e[i].as<float>();
                                prod[i]     = j_p.isNull() ? 0.0f : j_p[i].as<float>();
                                exp_t[i]    = j_t[i].as<float>();
                                cost[i]     = j_c[i].as<float>();
                                cost_tax[i] = j_ct[i].as<float>();
                                batt[i]     = j_b.isNull() ? 0.0f : j_b[i].as<float>();
                                sb[i]       = has_sb  ? j_sb[i].as<float>()  : 0.0f;
                                smn[i]      = has_smn ? j_smn[i].as<float>() : 0.0f;
                                smx[i]      = has_smx ? j_smx[i].as<float>() : 0.0f;
                                wth[i]      = has_wth ? j_wth[i].as<float>() : 0.0f;
                                sol[i]      = has_sol ? j_sol[i].as<float>() : 0.0f;
                                prc[i]      = has_prc ? j_prc[i].as<float>() : 0.0f;
                                op_mode[i]  = has_op ? j_op[i].as<float>() : 0.0f;
                              }

                              int cur_hr = root["current_hour"].is<int>() ? root["current_hour"].as<int>() : id(optimizer_ptr)->get_current_ecodan_hour();
                              int cur_day = id(optimizer_ptr)->get_current_ecodan_day();

                              id(optimizer_ptr)->store_odin_data(cur_hr, prod, sol, op_mode);

                              esphome::asgard_dashboard::EcodanDashboard::LastRunStats stats;
                              stats.execution_ms    = root["execution_ms"].as<uint32_t>();
                              stats.heat_loss       = root["used_heat_loss"].as<float>();
                              stats.base_cop        = root["used_base_cop"].as<float>();
                              stats.thermal_mass    = root["used_thermal_mass"].as<float>();
                              stats.exp_consumption = root["total_consumption_kwh"].as<float>();
                              stats.exp_production  = root["total_heat_produced_kwh"].as<float>();
                              stats.exp_solar       = root["total_solar_generation_kwh"].as<float>();
                              stats.exp_solar_total = root["total_solar_total_kwh"].is<float>() ? root["total_solar_total_kwh"].as<float>() : stats.exp_solar;
                              stats.total_cost      = root["total_cost_eur"].as<float>();
                              stats.total_cost_tax  = root["total_cost_with_tax_eur"].as<float>();

                              id(asgard_dashboard_id)->store_odin_data(
                                cur_hr, cur_day, exp_end_t, nrg, prod, exp_t, cost, cost_tax, batt, sb, smn, smx, wth, sol, prc, op_mode, stats);
                            }
                            return true;
                          });
                        }

interval:
  - interval: 60s
    then:
      - lambda: |-
          // Ensure we load NVS data once, and only when the Ecodan time is valid
          static bool nvs_loaded = false;
          int cur_day = id(optimizer_ptr)->get_current_ecodan_day();
          if (!nvs_loaded && cur_day != -1) {
              id(asgard_dashboard_id)->load_odin_data(cur_day);
              nvs_loaded = true;
          }

          // BOOT FETCH: Retry every 60s until the server is actually online
          static bool initial_fetch_done = false;
          if (nvs_loaded && !initial_fetch_done) {
              // Wait until the solver is enabled AND the ping task confirms it is online
              if (id(sw_use_solver).state && id(bin_solver_connected).state) {
                  ESP_LOGI("asgard_dashboard", "Initial load: Server is ONLINE. Fetching MPC optimization.");
                  id(fetch_odin_optimization)->execute();
                  initial_fetch_done = true;
              }
          }

          if (id(optimizer_ptr)->check_and_clear_odin_fetch_request()) {
            ESP_LOGI("asgard_dashboard", "fetching MPC optimization...");
            id(fetch_odin_optimization)->execute();
          }

          {
            // Track hourly heating actuals (DHW excluded via get_heating_*_kwh()).
            // Two snapshots per hour:
            //   prev_start_* = value at start of previous hour
            //   cur_start_*  = value at start of current hour (refreshed on hour change)
            // Diff for completed hour = cur_start - prev_start (both are clean boundaries).
            static int   last_actual_hour = -1;
            static float prev_start_cons  = 0.0f;
            static float prev_start_prod  = 0.0f;
            static float cur_start_cons   = 0.0f;
            static float cur_start_prod   = 0.0f;
            static int   snapped_hour     = -1;

            int cur_hr = id(optimizer_ptr)->get_current_ecodan_hour();

            if (nvs_loaded && cur_hr >= 0 && cur_hr < 24) {

              // On hour change: promote cur_start → prev_start, take new cur_start snapshot.
              if (snapped_hour != cur_hr) {
                prev_start_cons = cur_start_cons;
                prev_start_prod = cur_start_prod;
                cur_start_cons  = id(optimizer_ptr)->get_heating_consumed_kwh();
                cur_start_prod  = id(optimizer_ptr)->get_heating_produced_kwh();
                snapped_hour    = cur_hr;
              }

              if (last_actual_hour == -1) {
                last_actual_hour = cur_hr;

              } else if (cur_hr != last_actual_hour) {
                int completed_hr = (cur_hr == 0) ? 23 : cur_hr - 1;
                float room = id(virtual_climate_z1).current_temperature;

                // diff = cur_start (= end of completed hour) - prev_start (= start of completed hour)
                float cons = cur_start_cons - prev_start_cons;
                float prod = cur_start_prod - prev_start_prod;
                if (cons < 0.0f) cons = 0.0f;
                if (prod < 0.0f) prod = 0.0f;

                id(asgard_dashboard_id)->update_actual_data(completed_hr, cons, prod, room);
                last_actual_hour = cur_hr;
              }
            }
          }

  - interval: 60s
    then:
      - lambda: |-
          if (!id(sw_use_solver).state) {
            if (id(bin_solver_connected).state) id(bin_solver_connected).publish_state(false);
            return;
          }

          static uint32_t last_ping_time = 0;
          uint32_t now = millis();
          
          // If the server is currently ONLINE, we only need to check every 5 minutes (300000 ms).
          // If OFFLINE, we keep checking every 60 seconds to quickly reconnect.
          if (id(bin_solver_connected).state && last_ping_time != 0 && (now - last_ping_time < 300000)) {
            return;
          }
          last_ping_time = now;

          static volatile int ping_status = -1; // -1: idle/busy, 0: offline, 1: online
          static char ping_ip[32] = {0};
          static volatile bool ping_ip_ready = false;
          static volatile bool task_running = false;

          if (ping_status != -1) {
            bool is_alive = (ping_status == 1);
            if (id(bin_solver_connected).state != is_alive) {
              id(bin_solver_connected).publish_state(is_alive);
            }
            ping_status = -1; // Reset for the next run
          }

          if (ping_ip_ready) {
            std::string new_ip(ping_ip);
            if (id(txt_solver_ip).state != new_ip) {
              id(txt_solver_ip).publish_state(new_ip);
            }
            ping_ip_ready = false; // Reset
          }
          
          // Prevent starting multiple tasks if the network is extremely slow
          if (task_running) return;
          task_running = true;

          // Safely copy the IP state before entering the thread
          static char current_ip_buf[32] = {0};
          strncpy(current_ip_buf, id(txt_solver_ip).state.c_str(), sizeof(current_ip_buf) - 1);

          xTaskCreate([](void *pvParameters) {
            std::string target_ip(current_ip_buf);
            bool is_alive = false;

            // cannot use gethostbyname and inet_ntoa in task, not thread safe
            if (target_ip == "" || target_ip == "0.0.0.0" || target_ip == "odin.local") {
              struct addrinfo hints = {};
              hints.ai_family = AF_INET;
              hints.ai_socktype = SOCK_STREAM;
              struct addrinfo *res = nullptr;

              if (getaddrinfo("odin.local", NULL, &hints, &res) == 0 && res != nullptr) {
                struct sockaddr_in *ipv4 = (struct sockaddr_in *)res->ai_addr;
                uint8_t *ip_bytes = (uint8_t *)&(ipv4->sin_addr.s_addr);
                char ip_buf[32];
                snprintf(ip_buf, sizeof(ip_buf), "%d.%d.%d.%d", ip_bytes[0], ip_bytes[1], ip_bytes[2], ip_bytes[3]);
                
                target_ip = std::string(ip_buf);
                
                // Safely write the resolved mDNS IP
                strncpy(ping_ip, target_ip.c_str(), sizeof(ping_ip) - 1);
                ping_ip_ready = true;
                freeaddrinfo(res);
              } else {
                ESP_LOGD("asgard_dashboard", "mDNS lookup failed.");
              }
            }

            if (target_ip != "" && target_ip != "0.0.0.0" && target_ip != "odin.local") {
              int sock = ::socket(AF_INET, SOCK_STREAM, IPPROTO_TCP);
              if (sock >= 0) {
                struct sockaddr_in serverAddress;
                serverAddress.sin_family = AF_INET;
                serverAddress.sin_port = htons(80);
                serverAddress.sin_addr.s_addr = inet_addr(target_ip.c_str());

                // Set a 2-second timeout to prevent the task from hanging indefinitely
                struct timeval tv;
                tv.tv_sec = 2;
                tv.tv_usec = 0;
                ::setsockopt(sock, SOL_SOCKET, SO_RCVTIMEO, &tv, sizeof(tv));
                ::setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));

                int res = ::connect(sock, (struct sockaddr *)&serverAddress, sizeof(serverAddress));
                if (res >= 0) {
                  // Send a proper HTTP request so the server can respond cleanly.
                  // A bare connect() + close() causes an abrupt TCP RST which can
                  // trigger a lwIP assert in recv_tcp on the ODIN side.
                  std::string http_req = "GET /api/version HTTP/1.0\r\nHost: " + target_ip + "\r\nConnection: close\r\n\r\n";
                  ::send(sock, http_req.c_str(), http_req.size(), 0);
                  // Drain response to allow clean TCP teardown
                  char drain[128];
                  while (::recv(sock, drain, sizeof(drain), 0) > 0) {}
                  is_alive = true;
                } else {
                  ESP_LOGD("asgard_dashboard", "ODIN server is OFFLINE (Connection refused/timeout).");
                }
                ::close(sock);
              }
            }

            // Write the status. The ESPHome main thread will pick this up on the next loop!
            ping_status = is_alive ? 1 : 0;
            task_running = false;

            ESP_LOGD("asgard", "odin_ping_task stack watermark: %d bytes", uxTaskGetStackHighWaterMark(NULL));
            vTaskDelete(NULL);
            
          }, "odin_ping_task", 12288, NULL, 1, NULL);